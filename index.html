        <title>Index</title>

    <body class="p-4">
        <header>
            <h2>
                Index
            </h2>
        </header>
        <main>
            <div class="p-2" id="links">
        <script>
                    const pages = ["misc/pawpad-quiz.html"]

                    for (page of pages) {
                        newAnchor = document.createElement('a')

                        newAnchor.textContent = page
                        newAnchor.href = page
                        newAnchor.className = "link-underline-success"

                        document.getElementById("links").appendChild(newAnchor)
                    }
                </script> 
            </div>
        </main>
    </body>
